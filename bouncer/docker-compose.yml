version: '3.8'

services:
  bouncer:
    build: .
    ports:
      - "4444:4444"
    environment:
      BOUNCER_PORT: 4444
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gaia
      DB_USER: bouncer_ro
      DB_PASSWORD: bouncer_password
      DB_POOL_SIZE: 10
    depends_on:
      - postgres
    networks:
      - bouncer-network
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: gaia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./priv/migrations:/docker-entrypoint-initdb.d
    networks:
      - bouncer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  bouncer-network:
    driver: bridge
