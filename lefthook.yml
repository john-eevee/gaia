output: false
pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      run: golangci-lint run --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.go"
      run: gofumpt -w -l {staged_files}
      stage_files: true
    fix-typos:
      run: typos --write-changes {staged_files}
      stage_fixed: true
    links:
      glob: "*.md"
      run: lychee {staged_files}

commit-msg:
  commands:
    "lint-commit-msg":
      run: ./scripts/validate-commit.sh {1}
      runner: bash

